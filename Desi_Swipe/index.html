<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Real or Fake? - JEWLIF Deepfake Detector</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#1a1a3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Real or Fake?">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: #1a1a3a;
      color: #ffffff;
    }

    /* =====================================================
       JEWLIF THEMES - Farben aus dem Logo
       Dunkelblau (#1a1a3a), Orange (#f5a623), Pink/Magenta (#e84393)
       ===================================================== */
    
    :root {
      /* Classic Theme (TikTok-Style) */
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.12);
      --accent1: #00f5d4;           /* Cyan - "Real" */
      --accent2: #ff006e;           /* Pink - "Fake" */
      --accent-highlight: #f5a623;  /* Orange Highlight */
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --glow1: rgba(0, 245, 212, 0.3);
      --glow2: rgba(255, 0, 110, 0.3);
    }

    .theme-cyber {
      --card-bg: rgba(13, 17, 23, 0.9);
      --card-border: rgba(88, 166, 255, 0.2);
      --accent1: #58a6ff;
      --accent2: #f97316;
      --accent-highlight: #7ee787;
      --text: #f0f6fc;
      --text-muted: rgba(240, 246, 252, 0.5);
      --glow1: rgba(88, 166, 255, 0.4);
      --glow2: rgba(249, 115, 22, 0.4);
    }

    .theme-dreamy {
      --card-bg: rgba(45, 27, 78, 0.9);
      --card-border: rgba(232, 121, 249, 0.2);
      --accent1: #a78bfa;
      --accent2: #f472b6;
      --accent-highlight: #67e8f9;
      --text: #faf5ff;
      --text-muted: rgba(250, 245, 255, 0.6);
      --glow1: rgba(167, 139, 250, 0.4);
      --glow2: rgba(244, 114, 182, 0.4);
    }

    /* =====================================================
       TILED BACKGROUND - JEWLIF Pattern
       ===================================================== */
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    /* Ambient Glow */
    .ambient-glow {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, var(--glow1) 0%, transparent 40%),
                  radial-gradient(circle at 70% 80%, var(--glow2) 0%, transparent 40%);
      opacity: 0.4;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(20px, 20px) rotate(5deg); }
    }

    /* =====================================================
       JEWLIF LOGO - Oben Links
       ===================================================== */
    
    .logo {
      position: fixed;
      top: 30px;
      left: 40px;
      z-index: 200;
      height: 50px;
      width: auto;
      /* Logo ist als base64 eingebettet - keine externe Datei nötig */
    }

    /* =====================================================
       HEADER - Score (im Spiel)
       ===================================================== */
    
    .header {
      position: absolute;
      top: 40px;
      right: 60px;
      display: flex;
      gap: 20px;
      align-items: center;
      z-index: 100;
    }

    .score-box {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 14px 24px;
      border: 1px solid var(--card-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .score-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .score-value {
      font-size: 36px;
      font-weight: 900;
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Theme Switcher - nur auf Startscreen sichtbar */
    .theme-switcher {
      display: flex;
      gap: 10px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 10px;
      border: 1px solid var(--card-border);
    }

    .theme-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .theme-btn:hover {
      transform: scale(1.1);
    }

    .theme-btn.active {
      transform: scale(1.15);
      box-shadow: 0 0 20px currentColor;
    }

    .theme-btn.classic {
      background: linear-gradient(135deg, #00f5d4, #ff006e);
    }

    .theme-btn.cyber {
      background: linear-gradient(135deg, #58a6ff, #f97316);
    }

    .theme-btn.dreamy {
      background: linear-gradient(135deg, #a78bfa, #f472b6);
    }

    /* =====================================================
       TITLE
       ===================================================== */
    
    .title {
      font-size: 48px;
      font-weight: 900;
      font-family: 'Fredoka', sans-serif;
      margin-bottom: 12px;
      text-align: center;
      text-shadow: 0 0 40px var(--glow1);
      z-index: 10;
    }

    .title .real { color: var(--accent1); }
    .title .or { color: var(--text-muted); }
    .title .fake { color: var(--accent2); }

    .subtitle {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 36px;
      text-align: center;
      z-index: 10;
    }

    .subtitle .left { color: var(--accent2); font-weight: 700; }
    .subtitle .right { color: var(--accent1); font-weight: 700; }

    /* =====================================================
       CARDS
       ===================================================== */
    
    .card-stack {
      position: relative;
      width: 380px;
      height: 520px;
      z-index: 10;
    }

    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 28px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 2px solid var(--card-border);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      will-change: transform;
    }

    .card.dragging { cursor: grabbing; transition: none !important; }
    .card.animate { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease; }
    .card.top { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 60px var(--glow1); }

    .card-image {
      width: 100%;
      height: 380px;
      object-fit: cover;
      pointer-events: none;
      background: linear-gradient(135deg, #2a2a5a, #1a1a4a);
    }

    .card-gradient {
      position: absolute;
      bottom: 140px;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(to top, rgba(10,10,30,0.95) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-info {
      padding: 20px 24px;
      height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(10, 10, 30, 0.8);
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      margin-bottom: 6px;
    }

    .card-hint {
      font-size: 15px;
      color: var(--text-muted);
    }

    .card-counter {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      font-weight: 600;
    }

    /* Swipe Labels */
    .swipe-label {
      position: absolute;
      top: 24px;
      padding: 12px 24px;
      border-radius: 14px;
      font-weight: 800;
      font-size: 24px;
      font-family: 'Fredoka', sans-serif;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .swipe-label.fake {
      left: 24px;
      background: var(--accent2);
      color: #fff;
      transform: rotate(-12deg);
      box-shadow: 0 4px 20px var(--accent2);
    }

    .swipe-label.real {
      right: 24px;
      background: var(--accent1);
      color: #000;
      transform: rotate(12deg);
      box-shadow: 0 4px 20px var(--accent1);
    }

    /* =====================================================
       BUTTONS
       ===================================================== */
    
    .actions {
      display: flex;
      gap: 28px;
      margin-top: 40px;
      z-index: 10;
      align-items: center;
    }

    .action-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid;
      background: transparent;
      font-size: 36px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }

    .action-btn.fake {
      border-color: var(--accent2);
      background: rgba(232, 67, 147, 0.15);
      color: var(--accent2);
    }

    .action-btn.real {
      border-color: var(--accent1);
      background: rgba(76, 217, 100, 0.15);
      color: var(--accent1);
    }

    .action-btn:hover {
      transform: scale(1.12);
    }

    .action-btn.fake:hover { box-shadow: 0 0 30px var(--accent2); }
    .action-btn.real:hover { box-shadow: 0 0 30px var(--accent1); }

    /* Control Bar */
    .control-bar {
      position: absolute;
      bottom: 80px;
      display: flex;
      gap: 14px;
      z-index: 10;
    }

    .control-btn {
      padding: 10px 20px;
      border-radius: 14px;
      border: 2px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .control-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-highlight);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .control-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .control-btn.active {
      border-color: var(--accent-highlight);
      background: rgba(245, 166, 35, 0.2);
    }

    /* =====================================================
       FEEDBACK
       ===================================================== */
    
    .feedback {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      min-width: 200px;
      padding: 20px 30px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      text-align: center;
      z-index: 1000;
      pointer-events: none;
      white-space: nowrap;
    }

    .feedback.show {
      animation: feedbackPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .feedback.correct {
      background: var(--accent1);
      box-shadow: 0 0 60px var(--accent1);
      color: #000;
    }

    .feedback.wrong {
      background: var(--accent2);
      box-shadow: 0 0 60px var(--accent2);
      color: #fff;
    }

    /* Streak Animations */
    .feedback.streak-heart {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      box-shadow: 0 0 80px #ff6b6b, 0 0 120px #ff6b6b;
      font-size: 26px;
      animation: streakPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .feedback.streak-crown {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      box-shadow: 0 0 80px #ffd700, 0 0 120px #ffd700;
      font-size: 28px;
      animation: crownPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes feedbackPop {
      0% { transform: translate(-50%, -50%) scale(0); }
      50% { transform: translate(-50%, -50%) scale(1.15); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes streakPop {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); }
      50% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); }
      70% { transform: translate(-50%, -50%) scale(1.1) rotate(-2deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    @keyframes crownPop {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); }
      40% { transform: translate(-50%, -50%) scale(1.4) rotate(8deg); }
      60% { transform: translate(-50%, -50%) scale(1.2) rotate(-5deg); }
      80% { transform: translate(-50%, -50%) scale(1.1) rotate(2deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    /* =====================================================
       GAME OVER
       ===================================================== */
    
    .game-over {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      border-radius: 28px;
      border: 2px solid var(--card-border);
      padding: 50px;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .game-over-emoji { font-size: 80px; margin-bottom: 20px; }

    .game-over-title {
      font-size: 42px;
      font-weight: 900;
      font-family: 'Fredoka', sans-serif;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .game-over-score {
      font-size: 24px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .game-over-score .correct { color: var(--accent1); font-weight: 700; }
    .game-over-score .total { color: var(--accent2); font-weight: 700; }

    .game-over-message {
      font-size: 18px;
      color: var(--text-muted);
      margin-bottom: 32px;
      text-align: center;
      max-width: 350px;
    }

    .restart-btn {
      padding: 16px 44px;
      font-size: 20px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color: #000;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(76, 217, 100, 0.4);
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(76, 217, 100, 0.6);
    }

    /* =====================================================
       START SCREEN
       ===================================================== */
    
    .start-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      z-index: 1000;
    }

    .start-title {
      font-size: 64px;
      font-weight: 900;
      font-family: 'Fredoka', sans-serif;
      margin-bottom: 20px;
      text-shadow: 0 0 60px var(--glow1);
    }

    .start-subtitle {
      font-size: 22px;
      color: var(--text-muted);
      margin-bottom: 50px;
      text-align: center;
    }

    .start-btn {
      padding: 22px 70px;
      font-size: 28px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      border-radius: 26px;
      border: none;
      background: linear-gradient(135deg, var(--accent1), var(--accent-highlight), var(--accent2));
      background-size: 200% 200%;
      color: #000;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 40px rgba(245, 166, 35, 0.5);
      animation: gradientShift 3s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .start-btn:hover {
      transform: scale(1.05);
      animation: none;
    }

    /* Theme Auswahl auf Startscreen */
    .start-theme-section {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .start-theme-label {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .keyboard-hints {
      position: absolute;
      bottom: 60px;
      display: flex;
      gap: 30px;
      font-size: 16px;
      color: var(--text-muted);
    }

    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 10px;
      font-weight: 700;
      margin-right: 10px;
    }

    /* Tip */
    .tip {
      position: absolute;
      bottom: 30px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      z-index: 10;
    }

    /* =====================================================
       MARKED IMAGE OVERLAY (bei falschem Swipe auf Fake)
       ===================================================== */
    
    .marked-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      animation: fadeIn 0.3s ease;
    }
    
    .marked-overlay.fade-out {
      animation: fadeOut 0.3s ease forwards;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }
    
    .marked-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 90vw;
      max-height: 90vh;
    }
    
    .marked-label {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      color: var(--accent2);
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    
    .marked-content img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 16px;
      box-shadow: 0 10px 50px rgba(0,0,0,0.5);
    }
    
    .marked-hint {
      margin-top: 20px;
      font-size: 16px;
      color: var(--text-muted);
    }
    
    /* =====================================================
       MARKED BADGE (bei Zurück auf Fake-Bild)
       ===================================================== */
    
    .marked-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent2);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Fredoka', sans-serif;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(255, 0, 110, 0.4);
      animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    @keyframes badgePop {
      0% { transform: translateX(-50%) scale(0); }
      100% { transform: translateX(-50%) scale(1); }
    }
    
    .card.showing-marked {
      border: 3px solid var(--accent2);
      box-shadow: 0 0 30px rgba(255, 0, 110, 0.3);
    }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Ambient Glow Effect -->

    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Tip -->
    <div class="tip">💡 Achte auf Augen, Haare & Hintergrund | ← → Swipen | Backspace = Zurück | R = Neustart</div>
  </div>

  <script>
    // ============================================
    // BILDER-KONFIGURATION
    // Lege deine Bilder in die Ordner:
    //   images/real/  → Echte Bilder
    //   images/fake/  → Deepfakes (optional: bild_marked.jpg für Erklärung)
    // 
    // Die Datei bilder.json wird automatisch beim Build erstellt!
    // ============================================
    
    // CARDS werden aus bilder.json geladen
    let CARDS = [];
    
    // Lade Bilderliste aus JSON
    async function loadImages() {
      try {
        const response = await fetch('bilder.json');
        const data = await response.json();
        
        CARDS = [
          ...data.real.map(img => ({
            image: 'images/real/' + img,
            markedImage: null,
            isReal: true
          })),
          ...data.fake.map(img => {
            const baseName = img.substring(0, img.lastIndexOf('.'));
            const ext = img.substring(img.lastIndexOf('.'));
            return {
              image: 'images/fake/' + img,
              markedImage: 'images/fake/' + baseName + '_marked' + ext,
              isReal: false
            };
          })
        ];
        
        // Aktiviere Start-Button
        document.querySelector('.start-btn').disabled = false;
        document.querySelector('.start-btn').textContent = 'Spielen 🎮';
        
      } catch (error) {
        console.error('Fehler beim Laden der Bilder:', error);
        document.querySelector('.start-btn').textContent = 'Fehler beim Laden ❌';
      }
    }

    // Game State
    let cards = [];
    let currentIndex = 0;
    let score = 0;
    let totalAnswered = 0;
    let streak = 0;
    let isAnimating = false;
    let dragState = { isDragging: false, startX: 0, offsetX: 0 };
    let history = [];
    let shuffleEnabled = true;

    // Shuffle
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Theme (nur visuell, kein Switcher im Spiel)
    function setTheme(theme) {
      const app = document.getElementById('app');
      app.className = theme === 'classic' ? '' : `theme-${theme}`;
      
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`.theme-btn.${theme}`).classList.add('active');
    }

    // Toggle Shuffle
    function toggleShuffle() {
      shuffleEnabled = !shuffleEnabled;
      document.getElementById('shuffleStatus').textContent = shuffleEnabled ? 'An' : 'Aus';
      document.getElementById('shuffleBtn').classList.toggle('active', shuffleEnabled);
    }

    // Go Back
    function goBack() {
      if (history.length === 0 || isAnimating) return;
      
      const lastMove = history.pop();
      if (lastMove.wasCorrect) {
        score--;
        streak = Math.max(0, streak - 1);
      }
      totalAnswered--;
      currentIndex--;
      
      updateScore();
      updateBackButton();
      
      // Bei Fake-Bildern: zeige markierte Version
      const cardData = cards[currentIndex];
      if (!cardData.isReal && cardData.markedImage) {
        renderCardsWithMarked(cardData);
      } else {
        renderCards();
      }
    }

    // Rendert Karten, aber zeigt für die oberste Karte das markierte Bild
    function renderCardsWithMarked(markedCard) {
      const stack = document.getElementById('cardStack');
      stack.innerHTML = '';

      const visibleCards = cards.slice(currentIndex, currentIndex + 3).reverse();
      
      visibleCards.forEach((card, i) => {
        const isTop = i === visibleCards.length - 1;
        const offset = visibleCards.length - 1 - i;
        
        const cardEl = document.createElement('div');
        cardEl.className = `card ${isTop ? 'top showing-marked' : ''} animate`;
        cardEl.style.transform = `scale(${1 - offset * 0.05}) translateY(${offset * 12}px)`;
        cardEl.style.opacity = 1 - offset * 0.2;
        cardEl.style.zIndex = i;
        
        // Für die oberste Karte: markiertes Bild zeigen
        const imgSrc = isTop && card.markedImage ? card.markedImage : card.image;
        
        cardEl.innerHTML = `
          <img src="${imgSrc}" alt="Bild ${card.id}" onerror="this.src='${card.image}'">
          ${isTop && card.markedImage ? '<div class="marked-badge">🔍 Markierte Version</div>' : ''}
          <div class="card-counter">${currentIndex + 1}/${cards.length}</div>
          <div class="swipe-label fake">FAKE</div>
          <div class="swipe-label real">REAL</div>
        `;
        
        if (isTop) {
          setupCardInteraction(cardEl);
        }
        
        stack.appendChild(cardEl);
      });
    }

    function updateBackButton() {
      document.getElementById('backBtn').disabled = history.length === 0;
    }

    // Start Game
    function startGame() {
      document.getElementById('startScreen').classList.add('hidden');
      
      const cardData = shuffleEnabled ? shuffle(CARDS) : [...CARDS];
      cards = cardData.map((card, i) => ({ ...card, id: i + 1 }));
      
      currentIndex = 0;
      score = 0;
      totalAnswered = 0;
      streak = 0;
      history = [];
      
      updateScore();
      updateBackButton();
      renderCards();
    }

    function updateScore() {
      document.getElementById('scoreDisplay').textContent = `${score}/${totalAnswered}`;
    }

    // Render Cards
    function renderCards() {
      const stack = document.getElementById('cardStack');
      stack.innerHTML = '';

      const visibleCards = cards.slice(currentIndex, currentIndex + 3).reverse();
      
      visibleCards.forEach((card, i) => {
        const isTop = i === visibleCards.length - 1;
        const offset = visibleCards.length - 1 - i;
        
        const cardEl = document.createElement('div');
        cardEl.className = `card ${isTop ? 'top' : ''} animate`;
        cardEl.style.transform = `scale(${1 - offset * 0.05}) translateY(${offset * 12}px)`;
        cardEl.style.opacity = 1 - offset * 0.2;
        cardEl.style.zIndex = i;

        cardEl.innerHTML = `
          <img class="card-image" src="${card.image}" alt="Image ${card.id}" 
               onerror="this.style.background='linear-gradient(135deg, #2a2a5a, #1a1a4a)';">
          <div class="card-gradient"></div>
          <div class="swipe-label fake">FAKE 🤖</div>
          <div class="swipe-label real">REAL ✓</div>
          <div class="card-info">
            <div class="card-title">Bild #${card.id}</div>
            <div class="card-hint">Schau genau hin... 👀</div>
          </div>
          <div class="card-counter">${currentIndex + 1} / ${cards.length}</div>
        `;

        if (isTop) {
          cardEl.addEventListener('mousedown', handleDragStart);
          cardEl.addEventListener('touchstart', handleDragStart, { passive: true });
        }

        stack.appendChild(cardEl);
      });
    }

    // Drag Handlers
    function handleDragStart(e) {
      if (isAnimating) return;
      
      const card = e.currentTarget;
      card.classList.remove('animate');
      card.classList.add('dragging');
      
      const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      dragState = { isDragging: true, startX: clientX, card: card, offsetX: 0 };

      document.addEventListener('mousemove', handleDragMove);
      document.addEventListener('mouseup', handleDragEnd);
      document.addEventListener('touchmove', handleDragMove, { passive: true });
      document.addEventListener('touchend', handleDragEnd);
    }

    function handleDragMove(e) {
      if (!dragState.isDragging) return;
      
      const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
      const offsetX = clientX - dragState.startX;
      dragState.offsetX = offsetX;

      dragState.card.style.transform = `translateX(${offsetX}px) rotate(${offsetX * 0.05}deg)`;

      const fakeLabel = dragState.card.querySelector('.swipe-label.fake');
      const realLabel = dragState.card.querySelector('.swipe-label.real');
      fakeLabel.style.opacity = Math.min(Math.abs(Math.min(offsetX, 0)) / 80, 1);
      realLabel.style.opacity = Math.min(Math.max(offsetX, 0) / 80, 1);
    }

    function handleDragEnd() {
      if (!dragState.isDragging) return;

      document.removeEventListener('mousemove', handleDragMove);
      document.removeEventListener('mouseup', handleDragEnd);
      document.removeEventListener('touchmove', handleDragMove);
      document.removeEventListener('touchend', handleDragEnd);

      if (dragState.offsetX > 100) {
        animateSwipe('right');
      } else if (dragState.offsetX < -100) {
        animateSwipe('left');
      } else {
        dragState.card.classList.remove('dragging');
        dragState.card.classList.add('animate');
        dragState.card.style.transform = '';
        dragState.card.querySelector('.swipe-label.fake').style.opacity = 0;
        dragState.card.querySelector('.swipe-label.real').style.opacity = 0;
      }

      dragState.isDragging = false;
    }

    function handleSwipe(direction) {
      if (isAnimating || currentIndex >= cards.length) return;
      animateSwipe(direction);
    }

    function animateSwipe(direction) {
      if (isAnimating) return;
      isAnimating = true;

      const card = document.querySelector('.card.top');
      if (!card) return;

      const currentCard = cards[currentIndex];
      const guessedFake = direction === 'left';
      const isCorrect = guessedFake !== currentCard.isReal;

      history.push({ index: currentIndex, wasCorrect: isCorrect, direction: direction });

      if (isCorrect) {
        score++;
        streak++;
      } else {
        streak = 0;
      }
      totalAnswered++;
      updateScore();

      card.classList.remove('dragging');
      card.classList.add('animate');
      card.style.transform = `translateX(${direction === 'left' ? '-150%' : '150%'}) rotate(${direction === 'left' ? '-30deg' : '30deg'})`;
      card.style.opacity = '0';

      showFeedback(isCorrect, currentCard.isReal);

      // Wenn Fake falsch als echt geswiped → zeige sofort markiertes Bild
      if (!isCorrect && !currentCard.isReal && currentCard.markedImage) {
        showMarkedImage(currentCard);
      }

      setTimeout(() => {
        currentIndex++;
        isAnimating = false;
        updateBackButton();

        if (currentIndex >= cards.length) {
          showGameOver();
        } else {
          renderCards();
        }
      }, !isCorrect && !currentCard.isReal && currentCard.markedImage ? 2500 : 400);
    }

    // Zeigt das markierte Bild als Overlay
    function showMarkedImage(cardData) {
      const overlay = document.createElement('div');
      overlay.className = 'marked-overlay';
      overlay.innerHTML = `
        <div class="marked-content">
          <div class="marked-label">So erkennst du den Fake:</div>
          <img src="${cardData.markedImage}" alt="Markiertes Bild" onerror="this.src='${cardData.image}'">
          <div class="marked-hint">Weiter in 2 Sekunden...</div>
        </div>
      `;
      document.getElementById('app').appendChild(overlay);
      
      setTimeout(() => {
        overlay.classList.add('fade-out');
        setTimeout(() => overlay.remove(), 300);
      }, 2200);
    }

    function showFeedback(isCorrect, wasReal) {
      const feedback = document.getElementById('feedback');
      let text = '';
      let extraClass = '';
      
      if (isCorrect) {
        // Streak milestones
        if (streak === 10) {
          text = '10er Streak! 👑';
          extraClass = 'streak-crown';
        } else if (streak === 5) {
          text = '5er Streak! ❤️';
          extraClass = 'streak-heart';
        } else {
          text = 'Richtig erkannt! 🔥';
        }
      } else {
        // Wrong answer - specific message
        if (wasReal) {
          text = 'Nope – das war echt! 😬';
        } else {
          text = 'Reingefallen – das war KI! 🤖';
        }
      }
      
      feedback.className = `feedback ${isCorrect ? 'correct' : 'wrong'} ${extraClass} show`;
      feedback.textContent = text;
      setTimeout(() => { feedback.className = 'feedback'; }, 1200);
    }

    function showGameOver() {
      const stack = document.getElementById('cardStack');
      document.getElementById('actions').classList.add('hidden');
      document.getElementById('controlBar').classList.add('hidden');

      const pct = Math.round((score / cards.length) * 100);
      let emoji, msg;

      if (pct >= 80) { emoji = '🎉'; msg = 'Unglaublich! Du bist ein Deepfake-Experte! 🔥'; }
      else if (pct >= 60) { emoji = '👍'; msg = 'Gut gemacht! Du hast ein gutes Auge! 💪'; }
      else if (pct >= 40) { emoji = '🤔'; msg = 'Nicht schlecht! Übung macht den Meister! 🎯'; }
      else { emoji = '😅'; msg = 'Deepfakes sind echt tricky... Versuch es nochmal! 💡'; }

      stack.innerHTML = `
        <div class="game-over">
          <div class="game-over-emoji">${emoji}</div>
          <h2 class="game-over-title">Game Over!</h2>
          <p class="game-over-score">Du hast <span class="correct">${score}</span> von <span class="total">${cards.length}</span> richtig erkannt!</p>
          <p class="game-over-message">${msg}</p>
          <button class="restart-btn" onclick="restartGame()">Nochmal spielen! 🔄</button>
        </div>
      `;
    }

    function restartGame() {
      document.getElementById('actions').classList.remove('hidden');
      document.getElementById('controlBar').classList.remove('hidden');
      history = [];
      startGame();
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('startScreen').classList.contains('hidden')) {
        if (e.key === 'ArrowLeft') handleSwipe('left');
        else if (e.key === 'ArrowRight') handleSwipe('right');
        else if (e.key === 'Backspace') { e.preventDefault(); goBack(); }
        else if (e.key === 'r' || e.key === 'R') restartGame();
        else if (e.key === 's' || e.key === 'S') toggleShuffle();
      } else {
        if (e.key === 'Enter' || e.key === ' ') startGame();
      }
    });

    // Initialisierung: Bilder laden
    loadImages().then(() => {
      // Preload alle Bilder
      CARDS.forEach(card => { 
        const img = new Image(); 
        img.src = card.image;
        if (card.markedImage) {
          const marked = new Image();
          marked.src = card.markedImage;
        }
      });
    });

    // Service Worker für Offline-Funktion registrieren
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('Service Worker registriert'))
        .catch(err => console.log('Service Worker Fehler:', err));
    }
  </script>
</body>
</html>
